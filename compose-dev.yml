services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: alpha-dev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - alpha-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    image: redis:8-alpine
    container_name: alpha-dev-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - alpha-dev-redis:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  alpha-dev-pgdata:
  alpha-dev-redis:
